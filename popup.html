<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; min-height: 620px; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); color: #fff; padding: 20px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .title h1 { font-size: 18px; font-weight: 600; }
    .title p { font-size: 11px; color: #888; margin-top: 2px; }
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 15px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .status-dot.listening { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-text { font-size: 12px; color: #aaa; flex: 1; }
    .platform { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #667eea; }
    .section { margin-bottom: 18px; }
    .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .ai-response, .history-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; max-height: 180px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: #ddd; }
    .ai-response .question { color: #667eea; font-weight: 600; margin-bottom: 10px; }
    .ai-response .answer { color: #fff; white-space: pre-wrap; }
    .ai-response .sources { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
    .ai-response .sources-title { font-size: 11px; color: #666; margin-bottom: 8px; }
    .ai-response .source-item { display: block; font-size: 11px; color: #4a9eff; text-decoration: none; margin: 4px 0; }
    .model-select { width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer; }
    .model-select option { background: #1a1a2e; }
    .history-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .history-item:last-child { border-bottom: none; }
    .history-q { color: #9fb0ff; font-size: 12px; font-weight: 600; }
    .history-a { color: #d8def8; font-size: 12px; margin-top: 4px; }
    .history-time { color: #79839d; font-size: 10px; margin-top: 6px; }
    .history-empty { color: #79839d; font-size: 12px; }
    .shortcuts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .shortcut { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
    .shortcut kbd { display: inline-block; padding: 3px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 11px; font-family: monospace; }
    .shortcut span { display: block; font-size: 10px; color: #666; margin-top: 4px; }
    .footer { text-align: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div class="title">
      <h1>AI Interview Assistant</h1>
      <p>即時面試答案助手</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">準備就緒</span>
    <span class="platform" id="platform">📺 -</span>
  </div>

  <div class="section">
    <div class="section-title">AI 模型</div>
    <select class="model-select" id="modelSelect">
      <option value="gpt-4o">OpenAI GPT-4o</option>
      <option value="gemini-1.5-pro">Google Gemini 1.5 Pro</option>
      <option value="claude-3.5-sonnet">Claude 3.5 Sonnet</option>
      <option value="minimax-m3">MiniMax M3</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">辨識語言</div>
    <select class="model-select" id="languageSelect">
      <option value="en-US">English (US)</option>
      <option value="zh-TW">繁體中文</option>
      <option value="ja-JP">日本語</option>
    </select>
  </div>

  <div class="section">
    <button class="btn btn-primary" id="startBtn"><span>🎤</span> 開始聆聽問題</button>
  </div>

  <div class="section">
    <div class="section-title">最新問題與答案</div>
    <div class="ai-response" id="aiResponse">
      <div class="question">等待問題...</div>
      <div class="answer">點擊上方按鈕開始聆聽面試官的問題，我會即時分析並提供答案建議。</div>
      <div class="loading-indicator" id="loadingIndicator" style="display:none;margin-top:10px;text-align:center;">
        <span style="color:#667eea;font-size:12px;">⏳ 分析中...</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">最近問答歷史</div>
    <div class="history-panel" id="historyList"><div class="history-empty">尚無歷史問答</div></div>
  </div>

  <div class="section shortcuts">
    <button class="btn btn-secondary" id="exportBtn">📥 匯出 Transcript</button>
    <button class="btn btn-secondary" id="settingsBtn">⚙️ 設定 API Key</button>
  </div>

  <div class="section">
    <div class="section-title">快捷鍵</div>
    <div class="shortcuts">
      <div class="shortcut"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>A</kbd><span>開始/停止</span></div>
      <div class="shortcut"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd><span>取得答案</span></div>
    </div>
  </div>

  <div class="footer">OpenClaw AI Interview Assistant v1.1</div>
  <script src="popup.js"></script>
</body>
</html>

  <div class="footer">OpenClaw AI Interview Assistant v1.1</div>

</body>
</html>
